services:
  - type: web
    name: expense-tracker
    runtime: node
    buildCommand: npm run server:install && npm run build && cd server && npm run build:frontend
    startCommand: cd server && npm start
    envVars:
      - key: MONGODB_URI
        scope: run
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
